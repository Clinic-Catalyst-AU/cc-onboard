name: Test clinic installs (Windows + Mac)

on:
  workflow_dispatch:
  push:
    paths:
      - 'clinic-bootstrap.ps1'
      - 'clinic-bootstrap.sh'
      - 'cc-clinic-pack.zip'
      - '.github/workflows/test-windows-install.yml'

jobs:
  windows-install:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Run clinic bootstrap (Windows PowerShell 5.1, same as a real clinic)
        shell: powershell
        run: .\clinic-bootstrap.ps1

      - name: Verify install (mirrors the self-check, but hard-fails)
        shell: powershell
        run: |
          $machine = [Environment]::GetEnvironmentVariable('Path','Machine')
          $user = [Environment]::GetEnvironmentVariable('Path','User')
          $env:Path = "$machine;$user;$env:USERPROFILE\.local\bin"
          $fail = $false
          foreach ($c in @('git','node','python','ffmpeg','claude')) {
            if (Get-Command $c -ErrorAction SilentlyContinue) { Write-Host "ok   $c" }
            else { Write-Host "MISSING  $c"; $fail = $true }
          }
          python -c "import PIL, requests, faster_whisper"
          if ($LASTEXITCODE -ne 0) { Write-Host "MISSING  python deps (PIL/requests/faster_whisper)"; $fail = $true }
          python -c "from faster_whisper import WhisperModel; WhisperModel('small', compute_type='int8')"
          if ($LASTEXITCODE -ne 0) { Write-Host "caption model not cached"; $fail = $true }
          if (Test-Path "$HOME\.claude\skills\cc-content-engine") { Write-Host "ok   CC skills" } else { Write-Host "MISSING  CC skills"; $fail = $true }
          if (Test-Path "$HOME\Clinic\CLAUDE.md") { Write-Host "ok   Clinic workspace" } else { Write-Host "MISSING  Clinic workspace"; $fail = $true }
          if (Test-Path "$HOME\.claude.json") { Write-Host "ok   .claude.json (MCP config)" } else { Write-Host "MISSING  .claude.json"; $fail = $true }
          if ($fail) { exit 1 }

      - name: Live URL serves the same script as this repo (waits for Pages)
        shell: powershell
        run: |
          # Pages serves .ps1 as octet-stream (PS 5.1 gives byte[] for .Content) - so download
          # BOTH to files and compare through the identical Get-Content decode path.
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/Clinic-Catalyst-AU/cc-onboard/$env:GITHUB_SHA/clinic-bootstrap.ps1" -OutFile raw.txt -UseBasicParsing
          $raw = (Get-Content raw.txt -Raw) -replace "`r",""
          foreach ($i in 1..20) {
            Invoke-WebRequest -Uri "https://clinic-catalyst-au.github.io/cc-onboard/clinic-bootstrap.ps1?v=$i" -OutFile live.txt -UseBasicParsing
            $live = (Get-Content live.txt -Raw) -replace "`r",""
            if ($live -eq $raw) { Write-Host "ok   live URL matches this commit"; exit 0 }
            Write-Host "  live differs (Pages/CDN still catching up) - retry $i/20 in 30s"
            Start-Sleep -Seconds 30
          }
          Write-Host "LIVE ps1 STILL differs after 10 min - check Pages deploy"
          exit 1

  mac-install:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Run clinic bootstrap (same one-liner a clinic Mac runs)
        run: bash clinic-bootstrap.sh

      - name: Verify install (mirrors the self-check, but hard-fails)
        run: |
          set -u
          eval "$(/opt/homebrew/bin/brew shellenv 2>/dev/null || /usr/local/bin/brew shellenv)"
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          FAIL=0
          for c in brew node git ffmpeg convert claude; do
            command -v "$c" >/dev/null 2>&1 && echo "ok   $c" || { echo "MISSING  $c"; FAIL=1; }
          done
          for m in PIL requests; do
            python3 -c "import $m" >/dev/null 2>&1 && echo "ok   python:$m" || { echo "MISSING  python:$m"; FAIL=1; }
          done
          python3 -c "import mlx_whisper" >/dev/null 2>&1 && echo "ok   captions: mlx-whisper" || { python3 -c "import faster_whisper" >/dev/null 2>&1 && echo "ok   captions: faster-whisper" || { echo "MISSING  caption engine (mlx or faster-whisper)"; FAIL=1; }; }
          [ -d "$HOME/.claude/skills/cc-content-engine" ] && echo "ok   CC skills" || { echo "MISSING  CC skills"; FAIL=1; }
          [ -f "$HOME/Clinic/CLAUDE.md" ] && echo "ok   Clinic workspace" || { echo "MISSING  Clinic workspace"; FAIL=1; }
          [ -f "$HOME/.claude/skills/cc-landing-page/references/ghl-offer-template.html" ] && echo "ok   GHL offer template" || { echo "MISSING  GHL offer template"; FAIL=1; }
          exit $FAIL

      - name: Live URL serves the same script as this repo (waits for Pages)
        run: |
          for i in $(seq 1 20); do
            curl -fsSL "https://clinic-catalyst-au.github.io/cc-onboard/clinic-bootstrap.sh?v=$i" -o live.sh
            if cmp -s live.sh clinic-bootstrap.sh; then echo "ok   live URL matches this commit"; exit 0; fi
            echo "  live differs (Pages/CDN still catching up) - retry $i/20 in 30s"; sleep 30
          done
          echo "LIVE sh STILL differs after 10 min - check Pages deploy"; exit 1
